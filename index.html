<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Servicio Jurídico — Ayuntamiento de Jaén</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap');
:root{--ny:#1a2332;--nl:#243044;--go:#c5a055;--gl:#d4b574;--gd:rgba(197,160,85,.15);--cr:#f5f0e8;--wh:#fff;--tx:#2c3e50;--tl:#7f8c9b;--tm:#a0aab4;--gn:#27ae60;--gnd:#1e8449;--gndd:#145a32;--rd:#c0392b;--bl:#2980b9;--or:#e67e22;--pu:#8e44ad;--bd:#ddd5c8;--sh:0 2px 12px rgba(26,35,50,.08)}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Source Sans 3',sans-serif;background:var(--cr);color:var(--tx);min-height:100vh}
.hd{background:linear-gradient(135deg,var(--ny),var(--nl));position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.2)}.hi{max-width:1440px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:8px 28px}.ht{display:flex;align-items:center;gap:12px}.hic{width:77px;height:77px;flex-shrink:0}.hic img{width:100%;height:100%;object-fit:contain}.hd h1{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:#fff}.hd h1 span{color:var(--gl);font-weight:400;font-size:12px;display:block;font-family:'Source Sans 3',sans-serif}
.nv{display:flex;gap:2px;flex-wrap:wrap}.nb{background:0 0;border:none;color:rgba(255,255,255,.5);padding:6px 13px;font-family:'Source Sans 3',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border-radius:5px;transition:all .2s;white-space:nowrap}.nb:hover{color:#fff;background:rgba(255,255,255,.07)}.nb.on{color:var(--go);background:rgba(197,160,85,.12);font-weight:600}
.mn{max-width:1440px;margin:0 auto;padding:18px 28px}
.cd{background:var(--wh);border-radius:10px;box-shadow:var(--sh);border:1px solid var(--bd);overflow:hidden;margin-bottom:12px}.chh{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--bd)}.chh h3{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--ny)}.cb{padding:16px}
.sts{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}.st{background:var(--wh);border-radius:10px;padding:16px;box-shadow:var(--sh);border:1px solid var(--bd);position:relative;overflow:hidden}.st::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}.st:nth-child(1)::before{background:var(--go)}.st:nth-child(2)::before{background:var(--bl)}.st:nth-child(3)::before{background:var(--or)}.st:nth-child(4)::before{background:var(--pu)}.stl{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--tl);margin-bottom:3px}.stv{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--ny);line-height:1.1}.std{font-size:10.5px;color:var(--tm);margin-top:2px}
.sr{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;padding:12px 16px}.sf{flex:1;min-width:130px}.sf label{display:block;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--tl);margin-bottom:2px}.sf input,.sf select{width:100%;padding:6px 9px;border:1px solid var(--bd);border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:12px;background:var(--cr);color:var(--tx)}.sf input:focus,.sf select:focus{outline:none;border-color:var(--go);box-shadow:0 0 0 3px var(--gd)}
.bt{padding:6px 14px;border:none;border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .12s;white-space:nowrap}.bt-o{background:0 0;color:var(--tl);border:1px solid var(--bd)}.bt-o:hover{border-color:var(--go);color:var(--go)}.bt-n{background:var(--ny);color:#fff}.bt-n:hover{background:var(--nl)}
table{width:100%;border-collapse:collapse}thead th{text-align:left;padding:7px 10px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tl);background:rgba(245,240,232,.5);border-bottom:1px solid var(--bd);white-space:nowrap}tbody tr{border-bottom:1px solid rgba(221,213,200,.3);transition:background .1s;cursor:pointer}tbody tr:hover{background:var(--gd)}tbody td{padding:7px 10px;font-size:11.5px;vertical-align:top}.dc{max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bg{display:inline-block;padding:1px 6px;border-radius:8px;font-size:9.5px;font-weight:600;white-space:nowrap}.bg-gr{background:rgba(39,174,96,.1);color:var(--gn)}.bg-rd{background:rgba(192,57,43,.1);color:var(--rd)}.bg-bl{background:rgba(41,128,185,.1);color:var(--bl)}.bg-or{background:rgba(230,126,34,.1);color:var(--or)}.bg-gy{background:rgba(127,140,155,.1);color:var(--tl)}.bg-go{background:var(--gd);color:var(--go)}.bg-pu{background:rgba(142,68,173,.1);color:var(--pu)}
.pg{display:flex;justify-content:center;align-items:center;gap:3px;padding:10px;border-top:1px solid var(--bd)}.pb{width:28px;height:28px;border:1px solid var(--bd);background:#fff;border-radius:5px;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Source Sans 3',sans-serif}.pb:hover{border-color:var(--go);color:var(--go)}.pb.on{background:var(--go);color:#fff;border-color:var(--go)}.pb:disabled{opacity:.3;cursor:default}.pi{font-size:10.5px;color:var(--tm);margin:0 4px}
.chg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}.chc{background:var(--wh);border-radius:10px;padding:16px;box-shadow:var(--sh);border:1px solid var(--bd)}.chc h4{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;color:var(--ny);margin-bottom:8px}.br{display:flex;align-items:center;gap:7px;margin-bottom:5px}.brl{font-size:10px;width:120px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.brt{flex:1;height:16px;background:var(--cr);border-radius:4px;overflow:hidden;display:flex}.brf{height:100%;min-width:1px}.brs{height:100%}.brc{font-size:10px;font-weight:700;width:28px;text-align:right}
.leg{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}.leg-i{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--tl)}.leg-c{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.bk{display:inline-flex;align-items:center;gap:4px;color:var(--go);font-weight:600;font-size:11.5px;cursor:pointer;margin-bottom:10px;padding:4px 9px;border-radius:5px;border:1px solid var(--bd);background:#fff}.bk:hover{background:var(--gd);border-color:var(--go)}
.bn{background:linear-gradient(135deg,var(--ny),var(--nl));border-radius:10px;padding:18px 22px;color:#fff;margin-bottom:12px}.bn h2{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;margin-bottom:3px}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.ds{margin-bottom:12px}.ds h4{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;color:var(--ny);margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--bd)}.dr{display:grid;grid-template-columns:130px 1fr;gap:3px;margin-bottom:4px;font-size:12px}.dl{font-weight:600;color:var(--tl);font-size:9.5px;text-transform:uppercase;letter-spacing:.3px;padding-top:2px}.dv{color:var(--tx);line-height:1.35;word-break:break-word}.dv a{color:var(--bl)}
.sub-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:6px}.sub-tbl th{text-align:left;padding:5px 8px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--tl);background:var(--cr);border-bottom:1px solid var(--bd)}.sub-tbl td{padding:5px 8px;border-bottom:1px solid rgba(221,213,200,.3)}.sub-tbl td.num{text-align:right;font-family:monospace}
.fg{margin-bottom:4px}.fg label{display:block;font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--tl);margin-bottom:2px}.fg input,.fg select,.fg textarea{width:100%;padding:7px 9px;border:1px solid var(--bd);border-radius:5px;font-family:'Source Sans 3',sans-serif;font-size:12.5px;background:var(--cr);color:var(--tx)}.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:var(--go);box-shadow:0 0 0 3px var(--gd)}.fg textarea{resize:vertical;min-height:55px}.fg .ck{display:flex;align-items:center;gap:7px;padding:6px 0}.fg .ck input[type=checkbox]{width:14px;height:14px;accent-color:var(--go)}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px}.fgr.c3{grid-template-columns:1fr 1fr 1fr}.fgr.c1{grid-template-columns:1fr}
.fa{display:flex;gap:7px;justify-content:flex-end;margin-top:12px;padding-top:10px;border-top:1px solid var(--bd)}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;height:50vh;gap:12px}.sp{width:38px;height:38px;border:3px solid var(--bd);border-top:3px solid var(--go);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.nig-d{font-family:monospace;font-size:11.5px;color:var(--bl);background:rgba(41,128,185,.06);padding:2px 6px;border-radius:4px}
.conc-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.conc-box{background:var(--cr);border-radius:8px;padding:12px;text-align:center}.conc-box .cv{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;color:var(--ny)}.conc-box .cl{font-size:9.5px;color:var(--tl);text-transform:uppercase;letter-spacing:.5px}
@media(max-width:1024px){.sts{grid-template-columns:repeat(2,1fr)}.chg,.dg,.fgr,.conc-summary{grid-template-columns:1fr}.fgr.c3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){.hi{flex-direction:column;gap:8px}.mn{padding:10px 10px}.sr{flex-direction:column}.sf{min-width:100%}.sts{grid-template-columns:1fr 1fr;gap:6px}.nv{justify-content:center}.fgr,.fgr.c3{grid-template-columns:1fr}}
</style>
</head><body>

const ev=getMainEv(p);
if(ev&&ev.anio&&ev.anio.length===4){const a=parseInt(ev.anio);if(!isNaN(a)&&a>1990&&a<2100)return a;}
// Fallback: parse inicio date field
const d=p.inicio;if(!d)return 0;
// Check for Excel serial date (pure number like 45345 = days since 1900-01-01)
const num=parseFloat(d);if(!isNaN(num)&&num>30000&&num<60000){const dt=new Date((num-25569)*86400000);return dt.getFullYear();}
// Try MM/DD/YY HH:MM:SS
const pts=d.split('/');if(pts.length>=3){let y=parseInt(pts[2]);if(!isNaN(y)){if(y<100)y+=2000;if(y>1990&&y<2100)return y;}}
// Try ISO format YYYY-MM-DD
if(d.length>=10&&d[4]==='-'){const y=parseInt(d.substring(0,4));if(!isNaN(y)&&y>1990&&y<2100)return y;}
return 0;}

  // === 3D PIE CHART SVG GENERATOR ===
  function pie3d(data,size){
    if(!data||!data.length)return'';
    const w=size||160,h=Math.round(w*0.75);
    const cx=w/2,cy=h/2-4,rx=w/2-8,ry=Math.round(rx*0.55),depth=12;
    const total=data.reduce((s,d)=>s+d.v,0);
    if(!total)return'';
    let svg='<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:'+w+'px">';
    // Build slices
    const slices=[];
    let angle=-(Math.PI/2);
    data.forEach(d=>{
      const sweep=d.v/total*Math.PI*2;
      slices.push({start:angle,end:angle+sweep,color:d.c,label:d.n,v:d.v,pct:Math.round(d.v/total*100)});
      angle+=sweep;
    });
    // Draw 3D sides (depth effect) - darkened color
    function darken(hex,amt){
      let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
      r=Math.max(0,r-amt);g=Math.max(0,g-amt);b=Math.max(0,b-amt);
      return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
    }
    function arcPath(sa,ea,ccy,rrx,rry){
      const x1=cx+rrx*Math.cos(sa),y1=ccy+rry*Math.sin(sa);
      const x2=cx+rrx*Math.cos(ea),y2=ccy+rry*Math.sin(ea);
      const large=ea-sa>Math.PI?1:0;
      return'M '+cx+' '+ccy+' L '+x1+' '+y1+' A '+rrx+' '+rry+' 0 '+large+' 1 '+x2+' '+y2+' Z';
    }
    // Side faces (only for bottom half of pie visible in 3D)
    slices.forEach(sl=>{
      const sa=sl.start,ea=sl.end;
      // Only draw side for segments in the lower half
      const sSin=Math.sin(sa),eSin=Math.sin(ea);
      if(sSin>0||eSin>0){
        const sideA=Math.max(sa,0),sideE=ea>Math.PI?Math.PI:ea;
        if(sideE>sideA&&sideA<Math.PI){
          const steps=Math.max(2,Math.ceil((sideE-sideA)/(Math.PI/16)));
          for(let i=0;i<steps;i++){
            const a1=sideA+(sideE-sideA)*i/steps;
            const a2=sideA+(sideE-sideA)*(i+1)/steps;
            const x1t=cx+rx*Math.cos(a1),y1t=cy+ry*Math.sin(a1);
            const x2t=cx+rx*Math.cos(a2),y2t=cy+ry*Math.sin(a2);
            const x1b=x1t,y1b=y1t+depth,x2b=x2t,y2b=y2t+depth;
            svg+='<path d="M '+x1t+' '+y1t+' L '+x2t+' '+y2t+' L '+x2b+' '+y2b+' L '+x1b+' '+y1b+' Z" fill="'+darken(sl.color,50)+'" opacity="0.85"/>';
          }
        }
      }
    });
    // Draw top face slices
    slices.forEach(sl=>{
      if(slices.length===1){
        svg+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+sl.color+'"/>';
      }else{
        svg+='<path d="'+arcPath(sl.start,sl.end,cy,rx,ry)+'" fill="'+sl.color+'" stroke="var(--c1)" stroke-width="0.5"/>';
      }
    });
    // Highlight rim
    svg+='<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>';
    svg+='</svg>';
    return svg;
  }

function fP(){let d=DB.p;

function matchInst(p,q){if(!q)return null;const evs=getAllEv(p);if(evs.length<2)return null;

function recalcConc(){
  const coms=DB.c.filter(c=>c.nig===concNig);const pags=DB.g.filter(g=>g.nig===concNig);
  let tCom=0,tRec=0,tPag=0;
  coms.forEach(c=>{const v=parseFloat(c.importe);if(!isNaN(v))tCom+=v;const vr=parseFloat(c.importeRec);if(!isNaN(vr))tRec+=vr;});
  pags.forEach(p=>{const v=parseFloat(p.importe);if(!isNaN(v))tPag+=v;});
  const u=id=>document.getElementById(id);
  if(u('tot_com'))u('tot_com').textContent=fNum(tCom);

}

function getInfFieldOpts(field){
  if(field==='negociado')return uv(DB.p,'negociado');
  if(field==='letrado')return uv(DB.p,'letrado');
  if(field==='calidad')return uv(DB.p,'calidad');
  if(field==='estado')return['En Primera Intancia','En Apelación','En Casación','En Ejecución','Finalizado'];
  if(field==='resultado')return['GANADO','DEMANDA DESESTIMADA','PERDIDO','ESTIM. PARCIAL','DESISTIDO','ACUERDO','SATISF. EXTRAPROCESAL','ARCHIVADO'];
  if(field==='admin')return uv(DB.p,'admin');
  if(field==='finalizado')return['Sí','No'];
  if(field==='sentencia')return['Con sentencia','Sin sentencia'];
  if(field==='firme')return['Firme','No firme'];
  if(field==='organo'){const s=new Set();DB.p.forEach(p=>{const ev=getMainEv(p);if(ev&&ev.organo)s.add(ev.organo);});return[...s].sort();}
  if(field==='clase'){const s=new Set();DB.p.forEach(p=>{const ev=getMainEv(p);if(ev&&ev.clase)s.add(ev.clase);});return[...s].sort();}
  if(field==='localidad'){const s=new Set();DB.p.forEach(p=>{const ev=getMainEv(p);if(ev&&ev.localidad)s.add(ev.localidad);});return[...s].sort();}
  if(field==='seccion'){const s=new Set();DB.p.forEach(p=>{const ev=getMainEv(p);if(ev&&ev.seccion)s.add(ev.seccion);});return[...s].sort();}
  if(field==='tercCondicion'){const s=new Set();DB.t.forEach(t=>{if(t.condicion)s.add(t.condicion);});return[...s].sort();}
  return[];
}
function getInfFieldLabel(field){
  const map={negociado:'Negociado',letrado:'Letrado',calidad:'Calidad procesal',estado:'Instancia procesal',resultado:'Resultado',organo:'Órgano Judicial',clase:'Clase de procedimiento',localidad:'Localidad del órgano',seccion:'Plaza / Nº / Sección',anioDesde:'Año desde',anioHasta:'Año hasta',finalizado:'Estado del expediente',admin:'Administración actuante',cuantiaMin:'Cuantía mínima (€)',cuantiaMax:'Cuantía máxima (€)',demandante:'Demandante (contiene)',sentencia:'Sentencia',firme:'Firmeza',tercNombre:'Tercero: Nombre / Razón social',tercDni:'Tercero: DNI / CIF',tercCondicion:'Tercero: Condición procesal',tercAbogado:'Tercero: Abogado',tercProcurador:'Tercero: Procurador',tercRepLegal:'Tercero: Representante legal'};
  return map[field]||field;
}

function addInfRule(){infRules.push({field:'negociado',op:'AND',value:''});R();}
function delInfRule(i){infRules.splice(i,1);if(infRules.length===0)infRules.push({field:'negociado',op:'AND',value:''});R();}
function updInfRule(i,key,val){infRules[i][key]=val;if(key==='field')infRules[i].value='';R();}
function applyInfFilters(){
  let base=DB.p.slice();
  const groups=[];
  let currentGroup={op:'AND',rules:[]};
  infRules.forEach((r,i)=>{
    if(i===0){currentGroup.op=r.op||'AND';currentGroup.rules.push(r);}
    else{
      if(r.op===currentGroup.op)currentGroup.rules.push(r);
      else{groups.push(currentGroup);currentGroup={op:r.op,rules:[r]};}
    }
  });
  groups.push(currentGroup);
  function testRule(p,rule){
    const f=rule.field,v=rule.value;
    if(!v)return true;
    const ev=getMainEv(p);
    if(f==='negociado')return(p.negociado||'')===v;
    if(f==='letrado')return(p.letrado||'')===v;
    if(f==='calidad')return(p.calidad||'')===v;
    if(f==='estado')return(p.estado||'')===v;
    if(f==='resultado')return(p.resultado||'').toUpperCase()===v.toUpperCase();
    if(f==='admin')return(p.admin||'')===v;
    if(f==='organo')return ev&&ev.organo===v;
    if(f==='clase')return ev&&ev.clase===v;
    if(f==='localidad')return ev&&(ev.localidad||'')===v;
    if(f==='seccion')return ev&&(ev.seccion||'')===v;
    if(f==='finalizado')return v==='Sí'?v0(p.finalizado):!v0(p.finalizado);
    if(f==='sentencia'){if(v==='Con sentencia')return ev&&v0(ev.sent);return ev&&!v0(ev.sent);}
    if(f==='firme'){if(v==='Firme')return ev&&v0(ev.firme);return ev&&!v0(ev.firme);}
    if(f==='anioDesde'){const y=getYearP(p);return y>=parseInt(v);}
    if(f==='anioHasta'){const y=getYearP(p);return y>0&&y<=parseInt(v);}
    if(f==='cuantiaMin'){const c=parseFloat(p.cuantia);return!isNaN(c)&&c>=parseFloat(v);}
    if(f==='cuantiaMax'){const c=parseFloat(p.cuantia);return!isNaN(c)&&c<=parseFloat(v);}
    if(f==='demandante'){const dem=getDemandante(p.nig).toLowerCase();return dem.includes(v.toLowerCase());}
    // Terceros filters — search all terceros linked to the procedure's NIG
    if(f==='tercNombre'){const tercs=getTercForNig(p.nig);const vl=v.toLowerCase();return tercs.some(t=>{const nm=(t.razon||'')+' '+(t.ap1||'')+' '+(t.ap2||'')+' '+(t.nombre||'');return nm.toLowerCase().includes(vl);});}
    if(f==='tercDni'){const tercs=getTercForNig(p.nig);const vl=v.toLowerCase();return tercs.some(t=>(t.dni||'').toLowerCase().includes(vl));}
    if(f==='tercCondicion'){const tercs=getTercForNig(p.nig);return tercs.some(t=>(t.condicion||'')===v);}
    if(f==='tercAbogado'){const tercs=getTercForNig(p.nig);const vl=v.toLowerCase();return tercs.some(t=>(t.abogado||'').toLowerCase().includes(vl));}
    if(f==='tercProcurador'){const tercs=getTercForNig(p.nig);const vl=v.toLowerCase();return tercs.some(t=>(t.procurador||'').toLowerCase().includes(vl));}
    if(f==='tercRepLegal'){const tercs=getTercForNig(p.nig);const vl=v.toLowerCase();return tercs.some(t=>(t.repLegal||'').toLowerCase().includes(vl));}
    return true;
  }
  return base.filter(p=>{
    let finalResult=true;
    for(const g of groups){
      const activeRules=g.rules.filter(r=>r.value);
      if(activeRules.length===0)continue;
      if(g.op==='AND'){
        const pass=activeRules.every(r=>testRule(p,r));
        finalResult=finalResult&&pass;
      } else if(g.op==='OR'){
        const pass=activeRules.some(r=>testRule(p,r));
        finalResult=finalResult&&pass;
      } else if(g.op==='NOT'){
        const pass=activeRules.every(r=>!testRule(p,r));
        finalResult=finalResult&&pass;
      }
    }
    return finalResult;
  });
}

function rInfReport(){
  if(!infResult)return'';
  const res=infResult;

    else if(c==='acuerdo')acuerdo++;else if(c==='satExtra')satExtra++;else if(c==='desistido')desist++;else tramite++;

  res.forEach(p=>{

    h+='<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis" title="'+H(p.desc)+'">'+H(p.desc)+'</td>';

function addEvento(pidx){if(!DB.p[pidx].eventos)DB.p[pidx].eventos=[];DB.p[pidx].eventos.push(['','','','','','','','','','','','']);R();}
function delEvento(pidx,eidx){if(DB.p[pidx].eventos){DB.p[pidx].eventos.splice(eidx,1);R();}}

function updT(tidx,field,val){DB.t[tidx][field]=val;}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

async function acquireToken() {
  try {
    const resp = await msalInstance.acquireTokenSilent({
      scopes: GRAPH_CONFIG.scopes,
      account: msalInstance.getActiveAccount()
    });
    graphToken = resp.accessToken;
    syncStatus = 'online';
    updateSyncUI('online');
    return true;
  } catch (e) {
    try {
      const resp = await msalInstance.acquireTokenPopup({ scopes: GRAPH_CONFIG.scopes });
      msalInstance.setActiveAccount(resp.account);
      graphToken = resp.accessToken;
      syncStatus = 'online';
      updateSyncUI('online');
      return true;
    } catch (e2) {
      console.error('Auth failed:', e2);
      updateSyncUI('error');
      return false;
    }
  }
}

// Graph API helpers
async function graphGet(url) {
  const resp = await fetch('https://graph.microsoft.com/v1.0' + url, {
    headers: { 'Authorization': 'Bearer ' + graphToken }
  });
  if (!resp.ok) throw new Error(`Graph API ${resp.status}: ${resp.statusText}`);
  return resp.json();
}

async function graphPatch(url, body) {
  const resp = await fetch('https://graph.microsoft.com/v1.0' + url, {
    method: 'PATCH',
    headers: {
      'Authorization': 'Bearer ' + graphToken,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`Graph API ${resp.status}: ${resp.statusText}`);
  return resp.json();
}

// ===== ONEDRIVE FOLDER LINKS FOR PROCEDURES =====

// Build search terms from evento data. Thinks like a human:
// A "PA 114-26" folder is named starting with "PA 114-26" (may have suffix like "(59-26-AJ)")
// A "PO 358-26" folder starts with "PO 358-26"
// Concursos: "CONCURSO ORDINARIO 766-24"
// Social: "AUTOS 172-26"
function _claseToPrefix(clase) {
  if (!clase) return '';
  const c = clase.toUpperCase();
  const map = {
    'ABREVIADO':'PA','ORDINARIO':'PO','P.O. LABORAL':'AUTOS','VERBAL':'JV',
    'MONITORIO':'MON','APELACIÓN':'APELACIÓN','CASACIÓN':'CASACIÓN',
    'EJECUCIÓN':'EJEC','PIEZA SEPARADA':'PS','CONCURSO':'CONCURSO ORDINARIO'
  };
  return map[c] || clase;
}

function _buildSearchTerm(ev) {
  if (!ev || !ev.numProc) return '';
  const prefix = _claseToPrefix(ev.clase);
  const num = ev.numProc;
  const anio = (ev.anio || '').replace(/^20/, '');
  return (prefix + ' ' + num + '-' + anio).trim();
}

// Cache: searchTerm -> { webUrl, name } | null
const _folderCache = {};

// The simplest possible approach: use Graph search to find the folder by name.
// This is what a human does: type the procedure name in the search box and pick
// the one that lives inside /PROCEDIMIENTOS/.
async function findEvFolder(ev) {
  if (!graphToken || !ev || !ev.numProc) return null;
  const searchTerm = _buildSearchTerm(ev);
  if (!searchTerm) return null;
  const cacheKey = searchTerm.toLowerCase();
  if (_folderCache[cacheKey] !== undefined) return _folderCache[cacheKey];

  console.log('[SJ Folders] Buscando carpeta: "' + searchTerm + '"');

  try {
    // Use the Graph search endpoint — same one that syncFromSharePoint already uses successfully
    const base = (window._driveBase || '/me/drive/root:').replace('/root:', '');
    // If _driveBase is "/drives/{id}/root:", base becomes "/drives/{id}"
    // If _driveBase is "/me/drive/root:", base becomes "/me/drive"
    const searchUrl = (base || '/me/drive') + "/root/search(q='" + encodeURIComponent(searchTerm) + "')?$top=25&$select=name,webUrl,id,folder,parentReference";
    const data = await graphGet(searchUrl);

    if (data && data.value && data.value.length > 0) {
      const termUpper = searchTerm.toUpperCase();
      // Pick the first folder whose name starts with our search term AND lives under /PROCEDIMIENTOS/
      const match = data.value.find(item =>
        item.folder &&
        item.name &&
        item.name.toUpperCase().startsWith(termUpper) &&
        item.parentReference &&
        item.parentReference.path &&
        item.parentReference.path.toUpperCase().includes('/PROCEDIMIENTOS/')
      );
      if (match) {
        console.log('[SJ Folders] ✓ Encontrada: "' + match.name + '" → ' + match.webUrl);
        _folderCache[cacheKey] = { webUrl: match.webUrl, id: match.id, name: match.name };
        return _folderCache[cacheKey];
      } else {
        console.log('[SJ Folders] ✗ Búsqueda devolvió ' + data.value.length + ' resultados pero ninguno coincide dentro de /PROCEDIMIENTOS/');
        // Log what we got for debugging
        data.value.forEach(function(v,i){ console.log('  [' + i + '] ' + (v.folder?'📁':'📄') + ' ' + v.name + ' | path: ' + (v.parentReference?v.parentReference.path:'-')); });
      }
    } else {
      console.log('[SJ Folders] ✗ Sin resultados de búsqueda para "' + searchTerm + '"');
    }
  } catch(e) {
    console.error('[SJ Folders] Error en búsqueda:', e.message);
  }

  _folderCache[cacheKey] = null;
  return null;
}

// Create folder for a procedure (only called explicitly via button or saveN)
async function createEvFolder(ev) {
  if (!graphToken || !ev || !ev.numProc) return null;
  const searchTerm = _buildSearchTerm(ev);
  if (!searchTerm) return null;

  // First, make sure it doesn't already exist
  const cacheKey = searchTerm.toLowerCase();
  delete _folderCache[cacheKey];
  const existing = await findEvFolder(ev);
  if (existing) return existing;

  // Determine the folder hierarchy: jurisdiccion / año / juzgado / [subtipo] / nombre
  const prefix = _getDrivePrefix();

  // Navigate from root to build the parent, creating segments as needed
  // Step 1: Find or access PROCEDIMIENTOS
  let procId;
  try {
    const pd = await graphGet(prefix + '/root:/PROCEDIMIENTOS');
    procId = pd.id;
  } catch(e) {
    try {
      const rootKids = await graphGet(prefix + '/root/children?$top=200&$select=name,id,folder');
      const pf = rootKids.value.find(c => c.folder && c.name === 'PROCEDIMIENTOS');
      if (pf) procId = pf.id;
    } catch(e2) {}
  }
  if (!procId) { console.error('[SJ Folders] No se encontró carpeta PROCEDIMIENTOS'); return null; }

  // Step 2: Build segments based on the evento data (thinking like a human)
  const o = (ev.organo || '').toUpperCase();
  let jurisdiccion = 'CONTENCIOSOS (2018 y ss)';
  if (o.includes('SOCIAL')) jurisdiccion = 'SOCIAL';
  else if (o.includes('MERCANTIL')) jurisdiccion = 'CONCURSOS';
  else if (o.includes('PENAL')) jurisdiccion = 'PENALES';
  else if (o.includes('CIVIL') && !o.includes('CONTENCIOSO')) jurisdiccion = 'CIVIL';

  const anio = (ev.anio || '').length === 2 ? '20' + ev.anio : (ev.anio || new Date().getFullYear().toString());

  let juzgado = '';
  if (o.includes('CONTENCIOSO') && o.includes('T.I')) juzgado = 'JC' + (ev.seccion || '');
  else if (o.includes('SOCIAL') && o.includes('T.I')) juzgado = 'SOCIAL ' + (ev.seccion || '');
  else if (o.includes('CIVIL') && o.includes('T.I')) juzgado = 'CIVIL ' + (ev.seccion || '');
  else if (o.includes('MERCANTIL')) juzgado = 'MERCANTIL ' + (ev.seccion || '');
  else if (o.includes('PENAL')) juzgado = 'PENAL ' + (ev.seccion || '');
  else if (o.includes('TSJA')) juzgado = 'TSJA';
  else if (o.includes('TS ')) juzgado = 'TS';

  let subtipo = '';
  const cl = (ev.clase || '').toUpperCase();
  if (cl === 'ABREVIADO') subtipo = 'Procedimientos abreviados';
  else if (cl === 'ORDINARIO') subtipo = 'Procedimientos ordinarios';

  const segments = [jurisdiccion, anio];
  if (juzgado) segments.push(juzgado);
  if (subtipo) segments.push(subtipo);
  segments.push(searchTerm);

  // Create each level, navigating by ID
  let currentId = procId;
  let lastItem = null;
  for (const seg of segments) {
    // List children and look for this segment
    const kids = await graphGet(prefix + '/items/' + currentId + '/children?$top=200&$select=name,id,folder,webUrl');
    const found = kids.value ? kids.value.find(c => c.folder && c.name && c.name.toUpperCase() === seg.toUpperCase()) : null;
    if (found) {
      currentId = found.id;
      lastItem = found;
    } else {
      // Create it
      try {
        const resp = await fetch('https://graph.microsoft.com/v1.0' + prefix + '/items/' + currentId + '/children', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + graphToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: seg, folder: {}, '@microsoft.graph.conflictBehavior': 'fail' })
        });
        if (resp.ok) {
          lastItem = await resp.json();
          currentId = lastItem.id;
        } else {
          console.error('[SJ Folders] Error creando "' + seg + '": ' + resp.status);
          return null;
        }
      } catch(e) {
        console.error('[SJ Folders] Error creando "' + seg + '":', e.message);
        return null;
      }
    }
  }

  // Create standard subfolders
  if (lastItem && lastItem.id) {
    for (const sub of ['Docum interna', 'Enviar al juzgado']) {
      try {
        await fetch('https://graph.microsoft.com/v1.0' + prefix + '/items/' + lastItem.id + '/children', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + graphToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: sub, folder: {}, '@microsoft.graph.conflictBehavior': 'fail' })
        });
      } catch(e) { /* ya existe */ }
    }
  }

  if (lastItem) {
    _folderCache[cacheKey] = { webUrl: lastItem.webUrl, id: lastItem.id, name: lastItem.name };
    return _folderCache[cacheKey];
  }
  return null;
}

// Helper for _getDrivePrefix and createEvFolder
function _getDrivePrefix() {
  const db = window._driveBase || '/me/drive/root:';
  if (db.includes('/drives/')) {
    const driveId = db.match(/\/drives\/([^/]+)/)[1];
    return '/drives/' + driveId;
  }
  return '/me/drive';
}

            'font-size:11px;color:var(--ny);background:rgba(197,160,85,.1);border:1px solid var(--go);' +
            'border-radius:6px;text-decoration:none;font-weight:500;transition:all .15s" ' +
            'onmouseover="this.style.background=\'rgba(197,160,85,.25)\'" ' +
            'onmouseout="this.style.background=\'rgba(197,160,85,.1)\'">' +
            '📁 ' + instLabel + '</a>';
        } else {
          if (!window._pendingEvCreate) window._pendingEvCreate = {};
          const btnId = '_cfbtn_' + pidx + '_' + i;
          window._pendingEvCreate[btnId] = {organo:ev.organo||'',seccion:ev.seccion||'',localidad:ev.localidad||'',numProc:ev.numProc||'',anio:ev.anio||'',clase:ev.clase||''};
          html += '<span style="display:inline-flex;align-items:center;gap:6px;margin:3px 6px 3px 0;' +
            'padding:4px 10px;font-size:11px;color:var(--tl);background:var(--cr);border:1px solid var(--bd);' +

  }, 50);

// Read Excel from OneDrive
async function syncFromSharePoint() {
  if (!graphToken) return;
  // Determine the correct drive base path
  if (!window._driveBase) {
    try {
      // Try /me/drive first (if logged in as file owner)
      const test = await graphGet('/me/drive/root:' + GRAPH_CONFIG.excelPath);
      window._driveBase = '/me/drive/root:';
    } catch(e) {
      // If that fails, try to find the file via search or shared items
      try {
        const search = await graphGet("/me/drive/root/search(q='SERVICIO_JURIDICO_BD.xlsx')");
        if (search.value && search.value.length > 0) {
          const item = search.value[0];
          window._driveBase = '/me/drive/items/' + item.id + '/';
          // Actually we need the parent drive, let's use driveId
          if (item.parentReference && item.parentReference.driveId) {
            window._driveBase = '/drives/' + item.parentReference.driveId + '/root:';
          }
        }
      } catch(e2) {
        window._driveBase = '/me/drive/root:';
      }
    }
  }
  updateSyncUI('syncing');
  try {
    const path = encodeURIComponent(GRAPH_CONFIG.excelPath);
    // Read each sheet
    const sheets = ['PROCEDIMIENTOS','EVENTOS','TERCEROS','REGISTRO 2021-22','COMUNICACIONES','PAGOS'];
    for (const sheet of sheets) {
      const data = await graphGet(`${window._driveBase||'/me/drive/root:'}${GRAPH_CONFIG.excelPath}:/workbook/worksheets('${encodeURIComponent(sheet)}')/usedRange`);
      if (data.values && data.values.length > 1) {
        const headers = data.values[0];
        const rows = data.values.slice(1);
        applySheetData(sheet, headers, rows);
      }
    }
    lastSync = new Date();
    updateSyncUI('online');
    R(); // Re-render with fresh data
  } catch (e) {
    console.error('Sync from SharePoint failed:', e);
    updateSyncUI('error');
    alert('Error al sincronizar: ' + e.message + '\n\nVerifique que el archivo SERVICIO_JURIDICO_BD.xlsx existe en la ruta configurada.');
  }
}

function applySheetData(sheet, headers, rows) {
  const pK=['nig','admin','calidad','estado','desc','negociado','letrado','resultado','cuantia','inicio','cierre','notas','finalizado','ref','cuantiaIndet','acceso','accesoEjec','perjP','perjI','perjC'];
  const eK=['nig','organo','seccion','localidad','numProc','anio','clase','sent','fSent','firme','fFirm','costF','costC'];
  const tK=['nig','id','condicion','ap1','ap2','nombre','razon','dni','repLegal','abogado','procurador'];
  const rK=['organo','numJuz','ciudad','tipo','numProced','anio','negociado','asunto','demandante','demandado','letrado','resultado','notas','ref'];
  const cK_=['nig','fecha','concepto','subconcepto','importe','importeRec','fechaInforme'];
  const gK_=['nig','fecha','concepto','subconcepto','ejercicio','importe'];

  function toObj(keys, row) {
    const o = {};
    keys.forEach((k, i) => {
      if (i < row.length && row[i] != null) {
        let v = row[i];
        // Protect NIG and other ID fields from numeric precision loss
        if (k === 'nig' || k === 'id' || k === 'dni') {
          if (typeof v === 'number') {
            // Number has lost precision if > 2^53; flag it but convert as-is
            v = v.toFixed(0);
          } else {
            v = String(v).trim();
          }
        } else {
          v = String(v);
        }
        o[k] = v;
      } else {
        o[k] = '';
      }
    });
    return o;
  }

  if (sheet === 'PROCEDIMIENTOS') {
    // Save existing eventos before rebuilding
    const savedEv = {};
    DB.p.forEach(p => { if (p.nig && p.eventos && p.eventos.length) savedEv[p.nig] = p.eventos; });
    const newProcs = rows.filter(r => r.some(v => v)).map(r => {
      const p = toObj(pK, r);
      p.eventos = (p.nig && savedEv[p.nig]) ? savedEv[p.nig] : [];
      return p;
    });
    DB.p = newProcs;
    DB.p.forEach(p=>{if(p.negociado)p.negociado=normNeg(p.negociado);});
  } else if (sheet === 'EVENTOS') {
    // Group by NIG and attach to procs
    const evByNig = {};
    rows.filter(r => r.some(v => v)).forEach(r => {
      const e = toObj(eK, r);
      if (e.nig) {
        if (!evByNig[e.nig]) evByNig[e.nig] = [];
        evByNig[e.nig].push([e.organo,e.seccion,e.localidad,e.numProc,e.anio,e.clase,e.sent,e.fSent,e.firme,e.fFirm,e.costF,e.costC]);
      }
    });
    if(Object.keys(evByNig).length>0){DB.p.forEach(p => { if (p.nig && evByNig[p.nig]) p.eventos = evByNig[p.nig]; });}
  } else if (sheet === 'TERCEROS') {
    DB.t = rows.filter(r => r.some(v => v)).map(r => toObj(tK, r));
  } else if (sheet === 'REGISTRO 2021-22') {
    DB.r = rows.filter(r => r.some(v => v)).map(r => toObj(rK, r));
  } else if (sheet === 'COMUNICACIONES') {
    DB.c = rows.filter(r => r.some(v => v)).map(r => toObj(cK_, r));
  } else if (sheet === 'PAGOS') {
    DB.g = rows.filter(r => r.some(v => v)).map(r => toObj(gK_, r));
  }
}

// Write changes back to SharePoint
async function saveToSharePoint() {
  if (!graphToken) { alert('No conectado a SharePoint. Inicie sesión primero.'); return; }
  updateSyncUI('saving');
  try {
    // Write each sheet
    await writeSheet('COMUNICACIONES', ['NIG','Fecha','Concepto','Subconcepto','Importe comunicado','Importe reconocido','Fecha informe'],
      DB.c.map(c => [c.nig||'',c.fecha||'',c.concepto||'',c.subconcepto||'',c.importe||'',c.importeRec||'',c.fechaInforme||'']));
    
    await writeSheet('PAGOS', ['NIG','Fecha','Concepto','Subconcepto','Ejercicio','Importe'],
      DB.g.map(g => [g.nig||'',g.fecha||'',g.concepto||'',g.subconcepto||'',g.ejercicio||'',g.importe||'']));

    // Write PROCEDIMIENTOS (in case new ones were added)
    await writeSheet('PROCEDIMIENTOS', ['NIG','Administración','En calidad de','Estado','Descripción','Negociado','Letrado','Resultado','Cuantía','Fecha inicio','Fecha cierre','Notas','Finalizado','Ref MyTao','Cuantía indet.','Acceso procedimiento','Acceso ejecución','Perjuicio principal','Perjuicio intereses','Perjuicio costas'],
      DB.p.map(p => [p.nig||'',p.admin||'',p.calidad||'',p.estado||'',p.desc||'',p.negociado||'',p.letrado||'',p.resultado||'',p.cuantia||'',p.inicio||'',p.cierre||'',p.notas||'',p.finalizado||'',p.ref||'',p.cuantiaIndet||'',p.acceso||'',p.accesoEjec||'',p.perjP||'',p.perjI||'',p.perjC||'']));

    // Write EVENTOS — flatten all instancias procesales from all procedures
    const evRows = [];
    DB.p.forEach(p => {
      if (p.nig && p.eventos && Array.isArray(p.eventos)) {
        p.eventos.forEach(ev => {
          if (Array.isArray(ev)) {
            evRows.push([p.nig, ev[0]||'', ev[1]||'', ev[2]||'', ev[3]||'', ev[4]||'', ev[5]||'', ev[6]||'', ev[7]||'', ev[8]||'', ev[9]||'', ev[10]||'', ev[11]||'']);
          }
        });
      }
    });
    await writeSheet('EVENTOS', ['NIG','Órgano Judicial','Plaza/Nº/Secc','Localidad','Nº Proc.','Año','Clase','Sentencia','Fecha Sent.','Firme','Fecha Firmeza','Costas favor','Costas contra'], evRows);

    // Write TERCEROS
    await writeSheet('TERCEROS', ['NIG','ID','Condición','Apellido 1','Apellido 2','Nombre','Razón Social','DNI/CIF','Rep. Legal','Abogado','Procurador'],
      DB.t.map(t => [t.nig||'',t.id||'',t.condicion||'',t.ap1||'',t.ap2||'',t.nombre||'',t.razon||'',t.dni||'',t.repLegal||'',t.abogado||'',t.procurador||'']));

    lastSync = new Date();
    updateSyncUI('saved');
    setTimeout(() => updateSyncUI('online'), 2000);
  } catch (e) {
    console.error('Save failed:', e);
    updateSyncUI('error');
    alert('Error al guardar: ' + e.message);
  }
}

async function writeSheet(sheetName, headers, rows) {
  const allRows = [headers, ...rows];
  const range = `A1:${String.fromCharCode(64 + headers.length)}${allRows.length}`;
  
  // Clear existing data first
  try {
    await graphPatch(
      `${window._driveBase||'/me/drive/root:'}${GRAPH_CONFIG.excelPath}:/workbook/worksheets('${encodeURIComponent(sheetName)}')/range(address='A1:Z5000')`,
      { values: Array(5000).fill(Array(26).fill('')) }
    );
  } catch(e) { /* ignore clear errors */ }
  
  // Format NIG column(s) as text BEFORE writing data to prevent numeric conversion
  const nigColIdx = headers.indexOf('NIG');
  if (nigColIdx >= 0) {
    const colLetter = String.fromCharCode(65 + nigColIdx);
    try {
      await graphPatch(
        `${window._driveBase||'/me/drive/root:'}${GRAPH_CONFIG.excelPath}:/workbook/worksheets('${encodeURIComponent(sheetName)}')/range(address='${colLetter}1:${colLetter}${allRows.length}')`,
        { numberFormat: Array(allRows.length).fill(['@']) }
      );
    } catch(e) { console.warn('[SJ Sync] Could not set NIG column format:', e.message); }
  }

  // Write new data
  await graphPatch(
    `${window._driveBase||'/me/drive/root:'}${GRAPH_CONFIG.excelPath}:/workbook/worksheets('${encodeURIComponent(sheetName)}')/range(address='${range}')`,
    { values: allRows }
  );
}

// Sync UI indicator
function updateSyncUI(status) {
  const el = document.getElementById('syncBar');
  const spBtn = document.getElementById('spBtn');
  if (!el) return;
  console.log('[SJ Sync] Status:', status);
  if (status === 'config' && GRAPH_CONFIG.clientId === 'PENDIENTE_REGISTRAR') {
    el.style.display = 'none';
    if(spBtn)spBtn.style.opacity='.5';
    return;
  }
  el.style.display = 'block';
  if(spBtn && (status==='online'||status==='saved'))spBtn.style.opacity='1';
  // Remove old click handler
  el.onclick = null;
  if (status === 'offline' || status === 'ready' || status === 'error') {
    el.onclick = function(){ loginSharePoint(); };
    el.style.cursor = 'pointer';
  } else if (status === 'online') {
    el.onclick = null;
    el.style.cursor = 'default';
  }
  const colors = {config:'#f39c12',offline:'#3498db',ready:'#3498db',connecting:'#3498db',syncing:'#2980b9',online:'#27ae60',saving:'#e67e22',saved:'#27ae60',error:'#e74c3c'};
  const texts = {
    config:'⚙ Configurar conexión SharePoint',
    offline:'☁ Conectar con SharePoint',
    ready:'☁ Conectar con SharePoint',
    connecting:'◌ Conectando…',
    syncing:'↻ Sincronizando…',
    online:'✓ Conectado' + (lastSync ? ' · ' + lastSync.toLocaleTimeString('es-ES') : ''),
    saving:'↑ Guardando cambios…',
    saved:'✓ Guardado correctamente',
    error:'✕ Error — pulse para reintentar'
  };
  const bg = colors[status] || '#95a5a6';
  const tx = texts[status] || status;
  if (status === 'online') {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#27ae60"></span><span style="font-size:11px;color:#fff">'+tx+'</span><span style="font-size:10.5px;color:rgba(255,255,255,.6);cursor:pointer;padding:3px 8px;background:rgba(255,255,255,.1);border-radius:4px" onclick="event.stopPropagation();saveToSharePoint()">↑ Guardar</span><span style="font-size:10.5px;color:rgba(255,255,255,.6);cursor:pointer;padding:3px 8px;background:rgba(255,255,255,.1);border-radius:4px" onclick="event.stopPropagation();syncFromSharePoint()">↓ Actualizar</span><span style="font-size:10px;color:rgba(255,255,255,.35);cursor:pointer" onclick="event.stopPropagation();logoutSharePoint()">Salir</span></div>';
  } else {
    el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;gap:8px;padding:6px 0"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+bg+'"></span><span style="font-size:12px;color:#fff">'+tx+'</span></div>';
  }
}
